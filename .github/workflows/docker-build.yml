name: Build and Push LaTeX Image

on:
  push:
    paths:
      - 'Dockerfile'
      - '.github/workflows/docker-build.yml'
      - 'Makefile'
      - '.dockerignore'
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Build image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/latex-ci:latest .

      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/latex-ci:latest